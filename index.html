<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Sabor & Arte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
<h1>Restaurante Sabor e Arte</h1>
  <nav>
    <a href="index.html">Início</a>
    <a href="cardapio.html">Cardápio</a>
    <a href="endereco.html">Endereço</a>
    <a href="contato.html">Contato</a>
</nav>
</header>
    <main class="container py-5">
        <h2 class="text-center mb-4">Nosso Cardápio</h2>
        
        <div class="row row-cols-1 row-cols-md-4 g-4 justify-content-center">
            <div class="col">
                <div class="card h-100 text-center shadow-sm">
                    <div class="card-body">
                        <h3>Pizza</h3>
                        <p>de calabresa</p>
                        <span class="fw-bold text-danger">R$ 25,00</span>
                    </div>
                </div>
            </div>
            </div>

        <div id="carouselExampleInterval" class="carousel slide mt-5 shadow" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active" data-bs-interval="3000">
                    <img src="img/images.jpg" class="d-block w-100" alt="Pizza">
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="img/istockphoto-1581084025-1024x1024.jpg" class="d-block w-100" alt="Macarrão">
                </div>
                <div class="carousel-item">
                    <img src="img/salada.jpg" class="d-block w-100" alt="Salada">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2026 Restaurante Sabor & Arte</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
